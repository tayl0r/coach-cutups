# .github/workflows/rust.yml
name: rust
on:
  push:
    branches: [main, rust-rewrite]
  pull_request:
jobs:
  # Non-media code health on all three OSes. video-coach-media is excluded
  # because GStreamer installs (especially the Windows pkg-config + glib-sys
  # path) are fragile in CI; the media crate's own coverage lives in the
  # `media-tests` job below, on a Linux runner where the install is well-trodden.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --exclude video-coach-media --all-targets -- -D warnings
      # Build bin targets first. `cargo test --workspace` only builds lib +
      # test + bench targets; the harness's smoke test depends on the
      # video-coach-app binary existing in target/, which requires an
      # explicit build of [[bin]]s.
      - run: cargo build --workspace --exclude video-coach-media
      - run: cargo test --workspace --exclude video-coach-media

  media-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install GStreamer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools

      # Cache fixtures by manifest hash. When manifest is unchanged,
      # this restores fixtures/ from cache and the fetch script
      # short-circuits (sha256 already matches, no download).
      - name: Cache fixtures
        uses: actions/cache@v4
        with:
          path: fixtures
          key: fixtures-${{ hashFiles('fixtures/manifest.json') }}

      - name: Install jq (Ubuntu has it preinstalled, but ensure it)
        # Parens force `||` to gate the entire (update && install) chain.
        # Without them, `&&` binds tighter and `apt-get install` runs on
        # every invocation — even when jq is already present.
        run: which jq || (sudo apt-get update && sudo apt-get install -y jq)

      - name: Fetch fixtures from release
        run: ./scripts/fetch-fixtures.sh

      - name: Build bin targets (smoke test launches video-coach-app)
        run: cargo build --workspace --features media
      - name: Run media-tagged tests
        run: cargo test --workspace --features media
